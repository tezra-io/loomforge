name: Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Create a GitHub release after npm publish"
        required: true
        default: true
        type: boolean
  push:
    branches: [main]
    paths: ["package.json"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package metadata
        id: package
        run: |
          name=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")
          version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        id: already_published
        env:
          PKG_NAME: ${{ steps.package.outputs.name }}
          PKG_VERSION: ${{ steps.package.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "Version $PKG_VERSION is already published for $PKG_NAME."
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              exit 1
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run build
        if: steps.already_published.outputs.skip != 'true'
        run: pnpm run build

      - name: Run typecheck
        if: steps.already_published.outputs.skip != 'true'
        run: pnpm run typecheck

      - name: Run tests
        if: steps.already_published.outputs.skip != 'true'
        run: pnpm run test

      - name: Run lint
        if: steps.already_published.outputs.skip != 'true'
        run: pnpm run lint

      - name: Run format check
        if: steps.already_published.outputs.skip != 'true'
        run: pnpm run format

      - name: Create release tag
        if: steps.already_published.outputs.skip != 'true'
        env:
          TAG: v${{ steps.package.outputs.version }}
        run: git tag "$TAG"

      - name: Publish to npm
        if: steps.already_published.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Push tag
        if: steps.already_published.outputs.skip != 'true'
        env:
          TAG: v${{ steps.package.outputs.version }}
        run: git push origin "$TAG"

      - name: Create GitHub release
        if: ${{ steps.already_published.outputs.skip != 'true' && (github.event_name == 'push' || inputs.create_github_release) }}
        env:
          TAG: v${{ steps.package.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$TAG" --generate-notes
