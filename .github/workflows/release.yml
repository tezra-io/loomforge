name: Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Create a GitHub release after npm publish"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package name
        run: npm pkg get name

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")" >> "$GITHUB_OUTPUT"

      - name: Ensure version is not already published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version ${{ steps.package.outputs.version }} is already published for ${{ steps.package.outputs.name }}."
            exit 1
          fi

      - name: Run build
        run: pnpm run build

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Run lint
        run: pnpm run lint

      - name: Run format check
        run: pnpm run format

      - name: Pack tarball
        run: npm pack

      - name: Create release tag
        run: |
          git tag "v${{ steps.package.outputs.version }}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Push tag
        run: git push origin "v${{ steps.package.outputs.version }}"

      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.package.outputs.version }}" --generate-notes
